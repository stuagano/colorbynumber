services:
  - type: web
    name: color-by-number
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GRADIO_ANALYTICS_ENABLED
        value: "False"
    healthCheckPath: /
    autoDeploy: true
